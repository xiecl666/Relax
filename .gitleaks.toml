title = "Custom Gitleaks Configuration for Relax"

# Extend the default gitleaks config to include all built-in rules
[extend]
useDefault = true

# Custom rule: Internal domain - xiaohongshu.com
[[rules]]
id = "internal-domain-xiaohongshu"
description = "Detects references to internal domain xiaohongshu.com"
regex = '''(?i)(xiaohongshu\.com|xhs\.cn)'''
tags = ["internal", "domain"]
  [rules.allowlist]
  paths = ['''scripts/ci/benchmark\.sh$''']

# Custom rule: Internal path - /mnt/
[[rules]]
id = "internal-path-mnt"
description = "Detects references to internal mount path /mnt/"
regex = '''(?i)/mnt/[^\s'"]+'''
tags = ["internal", "path"]

# Custom rule: Platform injected environment variables - QS_ prefix
[[rules]]
id = "platform-env-qs"
description = "Detects platform injected environment variables with QS_ prefix"
regex = '''\bQS_[A-Z][A-Z0-9_]*\b'''
tags = ["internal", "env"]
  [rules.allowlist]
  regexTarget = "match"
  regexes = [
    # QS_USER alone is just an env var name reference, not a leaked value
    '''^QS_USER$''',
  ]

# Custom rule: MAAS token (MAAS prefix)
[[rules]]
id = "token-maas"
description = "Detects MAAS token with MAAS prefix"
regex = '''(?i)MAAS[a-zA-Z0-9-]{16,}'''
tags = ["internal", "token"]

# Custom rule: AKID token
[[rules]]
id = "token-akid"
description = "Detects AKID token"
regex = '''(?i)AKID[a-zA-Z0-9-]{16,}'''
tags = ["internal", "token"]

# Custom rule: LTA token (LTA prefix)
[[rules]]
id = "token-lta"
description = "Detects LTA token with LTA prefix"
regex = '''\bLTA[a-zA-Z0-9-]{16,}\b'''
tags = ["internal", "token"]
  [rules.allowlist]
  regexTarget = "match"
  regexes = [
    # GatedDeltaNetContextParallel etc. are Megatron class names, not LTA tokens
    '''(?i)lta[Nn]et''',
  ]

# Custom rule: Private IP - 10.0.0.0/8 (Class A)
[[rules]]
id = "private-ip-10-range"
description = "Detects hardcoded private IP addresses in 10.0.0.0/8 range (RFC 1918)"
regex = '''\b10\.\d{1,3}\.\d{1,3}\.\d{1,3}\b'''
tags = ["internal", "ip", "private"]
  [rules.allowlist]
  regexTarget = "match"
  regexes = [
    # 10.0.0.1 is a conventional placeholder IP in examples and tests.
    '''^10\.0\.0\.1$''',
  ]
  paths = ['''scripts/ci/benchmark\.sh$''']

# Custom rule: Private IP - 172.16.0.0/12 (Class B)
[[rules]]
id = "private-ip-172-range"
description = "Detects hardcoded private IP addresses in 172.16.0.0/12 range (RFC 1918)"
regex = '''\b172\.(1[6-9]|2\d|3[01])\.\d{1,3}\.\d{1,3}\b'''
tags = ["internal", "ip", "private"]

# Custom rule: Private IP - 192.168.0.0/16 (Class C)
[[rules]]
id = "private-ip-192-168-range"
description = "Detects hardcoded private IP addresses in 192.168.0.0/16 range (RFC 1918)"
regex = '''\b192\.168\.\d{1,3}\.\d{1,3}\b'''
tags = ["internal", "ip", "private"]
  [rules.allowlist]
  regexTarget = "match"
  regexes = [
    # 192.168.1.100 is used as a conventional example endpoint in docs.
    '''^192\.168\.1\.100$''',
  ]

# Allowlist: Ignore scanner metadata and generated docs artifacts
[allowlist]
description = "Ignore scanner metadata and generated docs artifacts"
paths = [
  '''\.gitleaks\.toml$''',
  '''docs/Dockerfile''',
  '''\.git/.*''',
  '''docs/\.vitepress/(dist|cache)/.*''',
]
